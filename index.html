<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gutcheck Coaching | Nutrition. Training. Mindset.</title>
  <meta name="description" content="Gutcheck Coaching helps you build better health through nutrition, fitness, discipline, accountability, and sustainable lifestyle habits." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="welcome" class="page welcome-page">
    <img src="assets/welcome.png" alt="Gutcheck Coaching welcome page" />
    <button class="enter-button" onclick="enterSite()" aria-label="Enter Gutcheck Coaching Website">Enter</button>
  </section>

  <main id="site" class="hidden">
    <nav class="mobile-nav">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#coaching">Coaching</a>
      <a href="#process">Process</a>
      <a href="#contact">Contact</a>
    </nav>

    <section id="home" class="page">
      <img src="assets/home.png" alt="Gutcheck Coaching home page" />
      <a class="hotspot work" href="#contact" aria-label="Work with me"></a>
      <a class="hotspot talk" href="#contact" aria-label="Let's talk"></a>
    </section>

    <section id="about" class="page">
      <img src="assets/about.png" alt="About Coach Antonio page" />
    </section>

    <section id="coaching" class="page">
      <img src="assets/coaching.png" alt="Gutcheck Coaching services page" />
      <a class="hotspot coaching-cta" href="#contact" aria-label="Ready to start your journey"></a>
    </section>

    <section id="process" class="page">
      <img src="assets/process.png" alt="Gutcheck Coaching process page" />
    </section>

    <section id="contact" class="page contact-page">
      <img src="assets/contact.png" alt="Gutcheck Coaching contact page" />
      <a class="hotspot email-link" href="mailto:thegutcheckcoaching@gmail.com" aria-label="Email Gutcheck Coaching"></a>
      <a class="hotspot phone-link" href="tel:+13606106877" aria-label="Call Gutcheck Coaching"></a>
      <a class="hotspot instagram-link" href="https://www.instagram.com/the_gut_check" target="_blank" rel="noopener" aria-label="Open Gutcheck Instagram"></a>

      <form class="contact-form" action="https://formsubmit.co/thegutcheckcoaching@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="New Gutcheck Coaching Website Inquiry">
        <input type="hidden" name="_captcha" value="false">
        <input class="field name" type="text" name="name" placeholder="Your Name" required>
        <input class="field email" type="email" name="email" placeholder="Your Email" required>
        <textarea class="field message" name="message" placeholder="Tell me about your goals..." required></textarea>
        <button class="send" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
