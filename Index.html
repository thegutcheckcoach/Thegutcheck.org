<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gut Check</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- LANDING PAGE -->
  <section id="landing" class="page active">
    <img src="assets/landing.png" alt="Landing Page" class="page-img" />
    <button class="enter-btn" onclick="showPage('home')">Click Here To Enter</button>
  </section>

  <!-- HOME PAGE -->
  <section id="home" class="page">
    <img src="assets/home.png" alt="Home Page" class="page-img" />
    <nav class="nav-buttons">
      <button onclick="showPage('coaching')">Coaching</button>
      <button onclick="showPage('about')">About</button>
      <button onclick="showPage('contact')">Contact</button>
    </nav>
  </section>

  <!-- COACHING PAGE -->
  <section id="coaching" class="page">
    <img src="assets/coaching.png" alt="Coaching Page" class="page-img" />
    <button class="back-btn" onclick="showPage('home')">Back</button>
  </section>

  <!-- ABOUT PAGE -->
  <section id="about" class="page">
    <img src="assets/about.png" alt="About Page" class="page-img" />
    <button class="back-btn" onclick="showPage('home')">Back</button>
  </section>

  <!-- CONTACT PAGE -->
  <section id="contact" class="page">
    <img src="assets/contact.png" alt="Contact Page" class="page-img" />
    <button class="back-btn" onclick="showPage('home')">Back</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
